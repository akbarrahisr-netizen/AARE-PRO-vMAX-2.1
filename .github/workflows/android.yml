name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 🟢 YEH STEP GRADLE KO BYPASS KAREGA
      - name: Force Build with Built-in Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.2 # Seedha 8.2 version install karega bina project ko chhede
          arguments: assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VMAX-Sniper-VIP-APK
          path: app/build/outputs/apk/debug/*.apk

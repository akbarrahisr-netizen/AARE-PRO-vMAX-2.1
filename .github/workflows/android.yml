name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # Thoda purana stable server

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11 # Purana stable Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Force Clean Setup
        run: |
          rm -f gradlew
          rm -rf gradle/wrapper
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VMAX-Sniper-VIP-APK
          path: app/build/outputs/apk/debug/*.apk

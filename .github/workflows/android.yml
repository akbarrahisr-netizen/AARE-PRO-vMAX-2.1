name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      # 🟢 STEP 1: Missing engine (Wrapper) ko install karega
      - name: Force Generate Wrapper
        run: gradle wrapper

      # 🟢 STEP 2: File chalane ki permission dega
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # 🟢 STEP 3: Build process shuru karega
      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VMAX-Sniper-VIP-APK
          path: app/build/outputs/apk/debug/*.apk
